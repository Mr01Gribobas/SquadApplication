services:
  postgres:
    image: postgres:17
    container_name: squadpostgres
    environment:
      - POSTGRES_DB=SquadDbPostgres
      - POSTGRES_USER=HSquadAdmin
      - POSTGRES_PASSWORD=42924870
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - squadnetwork
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U HSquadAdmin -d SquadDbPostgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  squadserver:
    build:
      context: .
      dockerfile: SquadServer/Dockerfile
    container_name: squadserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__SquadDbContext=Host=postgres;Port=5432;Database=SquadDbPostgres;Username=HSquadAdmin;Password=42924870;
    ports:
      - "5213:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - squadnetwork
    restart: unless-stopped
networks:
  squadnetwork:
    driver: bridge
volumes:
  postgres_data:
